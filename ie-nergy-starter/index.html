<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IE-nergy — Spring Campaign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Space+Grotesk:wght@500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Inter", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
    img { display: block; max-width: 100%; height: auto; }
    button { font-family: inherit; cursor: pointer; border: none; }
    input, select { font-family: inherit; }

    :root {
      --ink:     #071128;
      --blue:    #0E4FA8;
      --blue-hi: #1E7FD6;
      --ice:     #EAF6FB;
      --line:    #CFE0EC;
      --muted:   #2a3a52;
    }

    .page {
      display: grid;
      grid-template-columns: 1.05fr 1fr;
      min-height: 100vh;
      background: linear-gradient(180deg, #F7FBFD 0%, var(--ice) 100%);
      color: var(--ink);
    }

    .hero {
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .brand {
      font-family: "Space Grotesk", monospace;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--blue);
    }
    .title {
      font-size: clamp(3rem, 6vw, 5.5rem);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -.045em;
      text-transform: uppercase;
      margin: 3rem 0 2rem;
    }
    .title .ital {
      font-family: "Instrument Serif", serif;
      font-style: italic;
      font-weight: 400;
      color: var(--blue);
      text-transform: none;
      letter-spacing: -.01em;
    }
    .lead {
      font-size: 1.05rem;
      line-height: 1.6;
      max-width: 38ch;
      color: var(--muted);
    }
    .can {
      align-self: center;
      width: min(400px, 90%);
      margin-top: 3rem;
      filter: drop-shadow(0 40px 40px rgba(14, 79, 168, .25));
    }

    .form-wrap {
      background: #fff;
      padding: 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 1px solid var(--line);
    }
    .form-eyebrow {
      font-family: "Space Grotesk", monospace;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 1rem;
    }
    .form-title {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -.02em;
      margin-bottom: 2.5rem;
    }
    form p { margin-bottom: 1.25rem; }
    label {
      display: block;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--ink);
      margin-bottom: .5rem;
    }
    input[type="text"],
    input[type="email"],
    select {
      width: 100%;
      padding: .85rem 1rem;
      font-size: 1rem;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 0;
      outline: none;
      transition: border-color .15s ease;
    }
    input:focus, select:focus { border-color: var(--blue); }

    .consent {
      display: flex;
      gap: .7rem;
      align-items: flex-start;
      margin: 1.5rem 0 2rem;
    }
    .consent input { margin-top: .25rem; accent-color: var(--blue); }
    .consent label {
      font-size: .82rem;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
      color: var(--muted);
      margin: 0;
      line-height: 1.5;
    }

    button[type="submit"] {
      width: 100%;
      padding: 1.1rem;
      background: var(--ink);
      color: #fff;
      font-size: .78rem;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
      transition: background .15s ease;
    }
    button[type="submit"]:hover { background: var(--blue); }

    @media (max-width: 900px) {
      .page { grid-template-columns: 1fr; }
      .hero, .form-wrap { padding: 3rem 1.5rem; }
      .form-wrap { border-left: none; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>

<section class="page">
  <div class="hero">
    <div class="brand">IE-nergy · Spring 2026</div>
    <div>
      <h1 class="title">Wake the<br><span class="ital">campus.</span></h1>
      <p class="lead">An arctic kick, brewed for all-nighters and 9am case studies. Be first in line when the can lands.</p>
    </div>
    <img class="can" src="assets/ie-nergy-can.jpg" alt="IE-nergy can on ice">
  </div>

  <div class="form-wrap">
    <div>
      <div class="form-eyebrow">Join the drop</div>
      <h2 class="form-title">Be the first to crack one open.</h2>
      <form action="" method="post">
        <p>
          <label for="name">Name</label>
          <input type="text" id="name" name="FNAME" required>
        </p>
        <p>
          <label for="email">Email</label>
          <input type="email" id="email" name="EMAIL" required>
        </p>
        <p>
          <label for="campus">Campus</label>
          <select id="campus" name="CAMPUS" required>
            <option value="" disabled selected>Pick one</option>
            <option value="Madrid">Madrid</option>
            <option value="Segovia">Segovia</option>
            <option value="online">Online</option>
          </select>
        </p>
        <p>
          <label for="preferred_flavor">Preferred flavour</label>
          <select id="preferred_flavor" name="FLAVOR" required>
            <option value="" disabled selected>Pick one</option>
            <option value="Arctic Mint">Arctic Mint</option>
            <option value="Citrus Storm">Citrus Storm</option>
            <option value="Berry Voltage">Berry Voltage</option>
          </select>
        </p>
        <div class="consent">
          <input type="checkbox" id="gdpr_consent" name="gdpr_consent" required>
          <label for="gdpr_consent">I agree to receive marketing emails from IE-nergy.</label>
        </div>
        <button type="submit">Sign me up</button>
      </form>
    </div>
  </div>
</section>

</body>
</html>
